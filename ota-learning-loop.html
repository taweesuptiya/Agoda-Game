{day:31,theme:"Thai Hotel Crisis Management",emoji:"🚨",zone:4,zoneLabel:"Elite Zone",
intro:"Day 31 — Welcome to the Elite Zone. These five scenarios mirror real situations faced by Agoda Market Managers with top Thai hotel partners. Think strategically, not just reactively.",
keyTerms:[["Stakeholder De-escalation","Calming an executive-level crisis while protecting relationship and finding concrete solutions"],["Commission Evasion","Contractual violation requiring evidence-based diplomatic confrontation and formal escalation"],["Overbooking Protocol","Emergency response plan when rooms are sold beyond capacity across multiple channels"]],
questions:[
{q:"The GM of Bangkok's top riverside hotel calls you personally — their Presidential Suite shows ฿8,500 on a competitor OTA but ฿12,000 on Agoda. He is threatening to pull ALL inventory within 2 hours. What is your immediate first move?",
clue:"💡 In a senior stakeholder crisis: Recognize the issue, Respond with urgency and a clear process, commit to Resolve — but never promise what you cannot guarantee immediately.",
opts:["Immediately match the competitor OTA price on Agoda to neutralize the situation right now","Validate the discrepancy with evidence, acknowledge urgency, escalate internally to the rate integrity team within 15 minutes, commit to a 24-hour resolution timeline, and offer an interim visibility boost as a goodwill gesture","Explain calmly that rate parity enforcement is the hotel's own contractual responsibility","Suggest the GM contact the competing OTA directly to resolve the rate discrepancy themselves"],
a:1,
ex:"In a high-stakes crisis with a senior hotelier, apply the 3Rs: Recognize the issue immediately without minimizing it; Respond with a concrete action process ('I am escalating this in the next 15 minutes and will update you by 4pm'); and commit to Resolve with accountability and a clear timeline. You gather evidence — screenshots with timestamps and booking flow data — and escalate to Agoda's rate integrity team while documenting everything. An interim visibility boost (e.g., a featured placement for the next 48 hours) signals tangible support beyond words. Never lower your rate immediately without investigation — it could be a display glitch, a promotional code error, or a genuine violation by the competitor. Never blame the hotel, and never promise an outcome you cannot control. Your role is to be the hotel's trusted ally in the crisis, not a bystander. This response prevents panic inventory closure, demonstrates market manager competence under pressure, and preserves the relationship's long-term foundation."},
{q:"Five 1-star reviews appear on a top Phuket resort's Agoda listing in one week — all mentioning taxi scams happening outside the hotel entrance. The GM demands you remove all five. The hotel's score drops from 8.9 to 8.2. What is the correct approach?",
clue:"💡 Verified reviews can only be removed for specific policy violations — not simply because the hotel is unhappy. But there is still significant value you can deliver to help them recover.",
opts:["Remove all five reviews immediately — the hotel is a key partner and their request takes priority","Explain Agoda's review removal policy, investigate each review against the criteria, advise the hotel to respond publicly and professionally, and work with them on an operational plan to address the root cause","Agree the reviews are clearly unfair and escalate aggressively to your manager to force removal","Tell the hotel that review scores recover naturally over time and there is nothing you need to do now"],
a:1,
ex:"Verified reviews can only be removed if they violate Agoda's content policy — for example, if they are demonstrably fake, contain offensive language, or are entirely irrelevant to the stay experience. Taxi scams in front of the hotel, while genuinely unfair to the property, represent a real part of the guest arrival experience and typically do not qualify for automatic removal. Your structured response: First, review each of the five submissions against Agoda's content policy — if any are demonstrably fabricated (e.g., a user who never completed a stay, duplicate language suggesting a coordinated attack), escalate through the correct fraud reporting channel with supporting evidence. Second, coach the hotel on writing a professional, empathetic, and specific public response for each review — acknowledging the issue, detailing the corrective action already taken (e.g., 'We have established a licensed taxi desk at our entrance and partnered with BKK Taxis for metered pickup'). Third, activate Agoda's review solicitation tools to help the hotel generate fresh verified positive reviews from recent guests, diluting the score impact over 4-6 weeks. Fourth, advise operationally: install a hotel-managed transportation desk, add arrival safety information to booking confirmation emails, and brief bell staff to intercept approaching unofficial taxis. Attempting to remove valid reviews violates Agoda's integrity with guests, destroys platform trust, and would seriously damage your own credibility as a trustworthy partner-facing representative."},
{q:"Your top three Thai hotel partners (same ownership group, representing 40% of your personal portfolio revenue) demand a 3% commission reduction or they will move all properties exclusively to Booking.com. You have a joint meeting with the group Revenue Director tomorrow morning. How do you prepare and what is your primary strategy?",
clue:"💡 Never negotiate from panic or from ignorance of your own value. Preparation time is more valuable than reaction time. Data that makes the alternative look incomplete is your strongest tool.",
opts:["Email the Revenue Director tonight agreeing to a 3% reduction — losing 40% of portfolio revenue is catastrophic and must be prevented immediately at any cost","Refuse firmly in the meeting and remind them that Agoda's commission structure is a non-negotiable global policy","Prepare comprehensive performance analytics showing Agoda's unique value across feeder markets and booking volume, propose a structured joint business review, explore value-add alternatives to direct commission reduction, and escalate commercially to your line manager while creating space to find a creative solution","Subtly threaten reduced ranking and promotional exclusion if they proceed with moving to Booking.com exclusively"],
a:2,
ex:"This is a high-stakes commercial negotiation and preparation quality determines the outcome. The night before the meeting: Pull the full portfolio analytics — total booking value over the past 12 months, nationality breakdown of bookings (especially unique Asian markets such as Chinese, Korean, Indian, and Taiwanese travelers that direct channels or Booking.com cannot access as efficiently), ADR achieved on Agoda versus their reported direct booking average, peak period contribution during Songkran and high season, and Agoda's estimated marketing investment in their target origin markets. Research what Booking.com has genuinely offered them — is the 3% commission reduction their actual bottom line, or an opening bid in a negotiation? In the meeting, open by acknowledging their growth goals and validating the partnership's importance before presenting data: 'Agoda delivers 31% of your Korean guests and 44% of your Chinese bookings — these are segments your direct channel would require millions of baht in market-specific acquisition costs to replace.' Never agree to a blanket commission reduction without commercial team approval — it sets an irreversible precedent across your entire portfolio. Instead, propose alternatives that address their profitability goal: volume-based incentives tied to booking milestones, featured placement partnerships, access to exclusive promotional programs, or a joint business review with a 90-day performance target. Escalate to your commercial manager and potentially invite them to the meeting. The goal is to buy constructive time, demonstrate irreplaceable and data-backed value, and find a creative solution that meets their margin goal without undermining your commission structure."},
{q:"During Songkran — Thailand's biggest travel festival — a top Bangkok hotel's channel manager crashes. Their system is still showing 50 rooms as available on Agoda, but those rooms are already sold through direct and other OTA channels. You receive an alert: 30 new Agoda bookings have been confirmed in the past two hours. What is your immediate action plan?",
clue:"💡 Overbooking during Thailand's peak national holiday is a four-alarm reputational emergency. Speed, proactive guest communication, and a relocation plan must happen before anyone boards a plane.",
opts:["Let all 30 bookings process normally — the hotel is experienced and will manage any overbooking on arrival as it always does","Immediately coordinate an emergency stop sell on Agoda, verify the actual room inventory with the hotel's front office, identify which bookings can be honored, and proactively initiate guest communication and relocation planning before any guest travels to Bangkok","Cancel all 30 Agoda bookings immediately without any prior guest communication","First contact Booking.com to determine if they have the same overbooking exposure before taking any action on Agoda's side"],
a:1,
ex:"Overbooking during Songkran is a maximum-severity crisis. Every minute of delay increases the risk of guests arriving at a fully sold property during the most competitive accommodation period of the Thai calendar. Immediate response sequence: First (within 5 minutes), contact the hotel's front office manager directly — not the GM's assistant — to implement emergency stop sell on Agoda's extranet, or execute it yourself if your market manager access permits. Second, get a definitive accurate count of truly available rooms from the hotel's front desk system, not the channel manager or reservations team, as only front office can confirm physical availability. Third, triage the 30 new bookings chronologically — the most recently confirmed bookings are typically the ones displaced, as they represent inventory that was already allocated. Fourth, immediately flag this to Agoda's Customer Experience team with the full booking list, so they can initiate proactive contact with potentially affected guests — ideally before any guest checks in for a Songkran flight. Fifth, source equivalent or superior accommodation within the same neighborhood at negotiated emergency rates using your hotel partner network, and prepare an offer that compensates guests generously for the disruption. Sixth, document every decision, communication, and action from this moment forward for the post-incident review and any financial liability determination. Guests who receive advance notice and a genuine quality alternative will forgive; guests who arrive in Bangkok at midnight on Songkran to find no room will share that story with thousands of followers and potentially the media."},
{q:"You discover that a luxury Chiang Mai partner has been actively displaying Agoda Cash promotions on their listing to attract bookings, while collecting undisclosed side payments from some guests at checkout to bypass the commission on those transactions. This is a clear contractual violation. How do you handle it?",
clue:"💡 In Thailand's relationship-driven hotel culture, HOW you handle a confrontation matters as much as the confrontation itself. Evidence must come first, and dialogue must come before formal escalation wherever possible.",
opts:["Ignore the violation — confronting your highest-performing partner risks the relationship and your monthly revenue numbers","Report it immediately and directly to Agoda's legal team without speaking to the hotel first","Gather comprehensive evidence, request a private in-person meeting with the GM or owner, present the discrepancies professionally without accusatory language to allow them to explain, state the contractual violation and consequences clearly, set a specific deadline to rectify, and escalate through formal compliance channels with complete documentation","Send an anonymized warning to all hotels in your portfolio using this case as an example of what not to do"],
a:2,
ex:"Commission evasion is a serious breach of the partner agreement, but in Thailand's relationship-driven hotel culture — where face-saving is culturally essential and the Chiang Mai hotel community is tightly networked — how you conduct the confrontation will determine whether you resolve it professionally or create a lasting reputational problem for yourself and Agoda. Step one is building an evidence base before any conversation: compile booking records showing Agoda Cash promotions were active during the relevant period, cross-reference with payment reports showing discrepancies between expected and received settlement amounts, and document the pattern with specific dates and amounts. With solid evidence in hand, request a private, in-person meeting — not a phone call or email — with the GM or ownership directly. In Thai business culture, sensitive financial matters must be handled face-to-face to allow for the possibility of a face-saving resolution. Open the meeting without accusatory framing: 'We have noticed some payment discrepancies in your recent settlements that we would like to understand together.' This gives the hotel a genuine opportunity to present an innocent explanation — it may occasionally be an accounting error. If the violation is confirmed as intentional, state clearly and calmly the specific contractual clause that has been violated, the total estimated amount of commission impacted, and a specific deadline (7-14 days) to remit the outstanding balance and implement controls preventing recurrence. Document every commitment made in the meeting in a written follow-up within 24 hours. Escalate to Agoda's compliance and legal teams with the full evidence file per internal protocol, regardless of the hotel's response. Going directly to legal without attempting dialogue first will be interpreted within the local hotel community as aggressive and disproportionate — damaging your own standing as a trusted, relationship-oriented partner representative even when the hotel is demonstrably in the wrong."}
]},

{day:32,theme:"Revenue Strategy in the Thai Hotel Market",emoji:"📊🇹🇭",zone:4,zoneLabel:"Elite Zone",
intro:"Day 32 — Elite Zone. Thai hotel revenue has unique dynamics: extreme seasonality, diverse Asian feeder markets, and properties ranging from barefoot luxury to budget guesthouses. These scenarios test your strategic depth as a commercial advisor.",
keyTerms:[["RevPAR Index","Hotel's RevPAR as a percentage of the competitive set average — above 100 means outperforming the market"],["Content Score","OTA's metric of listing completeness and quality — directly impacts search ranking and CTR"],["Geo-targeted Promotion","Promotional deal visible only to users searching from a specific country or region"]],
questions:[
{q:"Low season in Koh Samui (May–October). Three top hotel partners have occupancy below 35%. All three demand an immediate blanket 40% rate cut across every room type. Why could this be the wrong primary strategy, and what do you recommend instead as their Market Manager?",
clue:"💡 Blanket panic pricing creates at least four compounding downstream problems. Think segmentation, packaging, and targeted demand stimulation rather than a race to the bottom.",
opts:["Agree entirely — deep rate cuts are the only mechanism that can stimulate low-season demand and you should implement them immediately","Blanket rate cuts risk triggering price wars, attracting mismatched guest segments, and permanently damaging ADR recovery. The correct recommendation is a multi-tactic strategy: geo-targeted domestic promotions, value-add packages, segment-specific campaigns, and controlled flash sales on specifically slow dates","Tell all three hotels to suspend operations during the low season months and reopen in November","Advise them to remove their properties from Agoda entirely during low season and focus exclusively on direct booking channels"],
a:1,
ex:"Recommending a blanket 40% rate cut is the reflexive but strategically costly response. The four compounding risks: First, it triggers competitive price wars — if your three properties cut 40%, their Koh Samui competitors respond within days and everyone ends up with lower ADR and unchanged occupancy. Second, deeply discounted luxury beach resorts attract guests whose expectations fundamentally mismatch the experience, generating negative reviews during the low season period that directly damage high-season conversion rates when rates need to be high. Third, training the booking market to expect 40% discounts in May through October makes future yield management during shoulder season nearly impossible — guests wait for the discount instead of booking at full rate in April. Fourth, ADR erosion in the market is genuinely difficult to reverse once it becomes established behavior. The recommended alternative strategy operates across five dimensions simultaneously: geo-targeted promotions of 15-20% (not 40%) directed specifically at Bangkok domestic travelers, Singapore weekend visitors, and Thailand-based expats using Agoda's geo-tools — these segments have short booking windows and strong demand even in low season; value-add packages that maintain the rate while improving perceived value (three nights plus a ฿2,000 spa credit and an airport transfer includes revenue-generating ancillary spending); minimum stay requirements of three nights that improve the economics of each booking compared to one-night stays at a deep discount; segment-specific campaigns targeting digital nomads with monthly rates, wellness travelers with curated spa packages, and families aligned to international school holiday calendars; and strategically timed flash sales applied only to the specifically slowest calendar weeks rather than sustained blanket discounting across the entire season."},
{q:"A 5-star Bangkok hotel (BAR ฿5,000) has a RevPAR Index of 67 against their competitive set — meaning they are generating only 67% of what comparable competitors earn per available room. Their occupancy is 58% versus the CompSet average of 78%. As Market Manager, walk through your complete diagnostic framework before recommending any action.",
clue:"💡 RevPAR Index underperformance at this level has multiple simultaneous root causes. A systematic six-dimension diagnosis prevents the common mistake of treating the visible symptom (low occupancy) while missing the actual disease.",
opts:["Immediately advise them to lower their BAR by 25% to close the 20-point occupancy gap with the CompSet — price is the most obvious lever","Conduct a systematic diagnostic across six dimensions — pricing strategy, content quality, review score, distribution policies, promotional participation, and booking window utilization — before recommending any single action","Suggest they invest in adding more room inventory through renovation to generate greater total revenue","Advise them to exit all OTA channels immediately and focus exclusively on GDS corporate bookings to match their 5-star market positioning"],
a:1,
ex:"A RevPAR Index of 67 is serious underperformance requiring analytical rigor before any prescription, because treating the wrong root cause wastes six months of effort. The six-dimension diagnostic framework: First, pricing strategy — is their ฿5,000 BAR genuinely competitive versus the CompSet on equivalent date ranges and room types? Are they dynamically adjusting rates for Bangkok events, international conferences, and demand spikes, or operating on static annual rates? Pull competitive rate shopping data for the prior 90 days and identify specific dates where they were materially out of position. Second, content quality — compare their content score versus the CompSet: photo count, photo quality, description completeness, amenity accuracy, and policy clarity. Poor content directly reduces algorithm ranking and click-through rate before any pricing comparison is even made. Third, review score — even a 0.3-point gap versus the CompSet significantly impacts both algorithmic ranking and guest conversion rates. What are the three most frequently mentioned complaint themes in reviews from the past six months? Fourth, distribution policies — are they restricting OTA allotment? Offering only non-refundable rates? Setting minimum stay requirements that eliminate booking volume? These policies reduce conversion before the rate is ever evaluated. Fifth, promotional participation — are they enrolled in Agoda flash sales, member deals, and geo-targeted promotions for their primary feeder markets? Competing CompSet hotels almost certainly are. Sixth, booking window — are they engaging the 60-to-90-day advance booking window with early bird rates? Hotels missing this window lose significant forward volume. After completing the diagnostic, build a prioritized action plan with 30-60-90 day milestones, assign clear ownership for each action item to a specific hotel team member, and schedule monthly RevPAR Index review sessions to track recovery velocity."},
{q:"A boutique Chiang Mai hotel has a genuinely exceptional 9.4 out of 10 review score and a charming, well-loved property — but a content score of only 38% and a position on page three of Agoda search results. The owner has declined professional photography three times, insisting that his own iPhone photos are more authentic and genuine. How do you change his mind using commercial evidence rather than aesthetic arguments?",
clue:"💡 Never argue aesthetics with a creative, values-driven owner. Argue in Thai Baht — specifically, the precise monthly revenue he is currently losing because potential guests are clicking on his better-photographed competitors instead of him.",
opts:["Accept his position respectfully — it is his property and his creative vision, and some travelers genuinely prefer authentic smartphone photography over staged professional images","Present data showing his listing click-through rate versus comparable boutique properties with professional photos, calculate the specific monthly revenue loss in Thai Baht attributable to lower CTR, offer Agoda's photography program to remove the financial barrier, and propose a 60-day data-driven pilot so the decision is based on evidence not opinion","Reduce his commission rate as a compensation measure for the reduced bookings caused by poor content","Demote his property to a lower partnership tier until he meets Agoda's minimum content standards"],
a:1,
ex:"The owner's authenticity objection is emotionally grounded and cannot be overcome with aesthetic counter-arguments — every aesthetic debate you win will lose you the relationship. The correct approach converts the conversation from taste to commercial evidence. Step one: pull his specific listing analytics and show his click-through rate compared to the three best-performing boutique hotels in Chiang Mai Old City, all of which have professional photography. The gap is typically three to five times lower CTR — this is the data, not your opinion. Step two: convert the CTR gap into lost monthly revenue in Thai Baht with specific arithmetic: if improved photos generate 600 additional monthly listing views at a 3% conversion rate at his average rate of ฿3,800, that equals approximately ฿68,400 in additional monthly revenue — ฿820,800 annually. Specific baht figures create visceral commercial impact that percentages never achieve. Step three: benchmark the leaders — 'The number one-ranked boutique hotel in Chiang Mai has a 91% content score and 26 professional photos. Their review score is 9.1 — lower than yours. Yet they receive three times your monthly booking volume. The only material difference is their photography.' Step four: remove the cost barrier entirely by offering Agoda's complimentary hotel photography program if available in Chiang Mai, or connecting him with a recommended local photographer who can deliver a full professional shoot for ฿4,000 to ฿7,000 — an investment recovered by a single additional booking. Step five: propose a 60-day controlled pilot — 'We upload professional photos and measure views, click-through rate, and bookings against your current baseline. If the data does not show meaningful improvement after 60 days, you have lost nothing and learned something real.' This framing treats him as the intelligent businessman he is, respects his authority over his property, and makes continued refusal commercially irrational rather than personally confrontational."},
{q:"The Tourism Authority of Thailand announces a major Visit Thailand Year campaign with a ฿500 million government marketing budget specifically targeting Chinese, Indian, Korean, and Middle Eastern international tourists. As Market Manager for a portfolio of 40 Thai hotel partners, how do you proactively mobilize your properties to capture the maximum share of this demand wave?",
clue:"💡 Government campaigns create a time-limited demand wave that rewards prepared hotels and punishes unprepared ones. Your role is to activate your portfolio before the wave arrives — not to react after bookings fail to materialize.",
opts:["Monitor the campaign for 60 days before taking action — it is too early to determine which nationalities will actually convert to bookings","Immediately brief your entire hotel portfolio on the campaign targets and timeline, align promotional strategies for each nationality, optimize multilingual content and culturally relevant amenity information for each target market, and coordinate with Agoda's marketing team for co-branded campaign alignment and geo-targeted promotional deployment","Inform only your top five highest-revenue properties — smaller hotels in the portfolio will benefit automatically without requiring preparation","Communicate to all hotels that the campaign will generate bookings automatically and no changes to their listings or pricing strategy are required"],
a:1,
ex:"Government tourism campaigns operate on a predictable demand cycle — hotels that prepare in advance capture the bookings; those that wait lose them to prepared competitors in the same destination. Execution plan across three timeframes: In the first two weeks, brief your entire portfolio on the TAT campaign targets, specific nationality focus, anticipated arrival windows, and any co-marketing opportunities. Identify which properties in your portfolio are best positioned for each target nationality based on location, facilities, and price point. In weeks two through four, execute targeted content optimization by nationality: for Chinese guests, ensure property descriptions and key amenity information are available in Mandarin, that photos include features particularly valued by Chinese travelers such as in-room bathtubs and buffet breakfast presentation, and that UnionPay payment is prominently confirmed; for Middle Eastern guests, ensure halal dining certification is prominently listed with specific restaurant details, prayer room availability or the nearest mosque is documented, and pork-free kitchen confirmation is included in the amenities section; for Indian guests, vegetarian menu options with specific dish examples, Bollywood film or cultural event connections if relevant, and family-friendly facilities should be highlighted; for Korean guests, popular nearby Korean restaurant locations, Korean-language amenity summaries, and K-drama filming location proximity if applicable should be added. In weeks three through six, align promotional strategy with each nationality's peak booking calendar — Chinese Golden Week, Diwali for Indian travelers, Eid periods for Middle Eastern guests, and Korean Chuseok — creating targeted early-bird campaigns timed to these windows. Coordinate with Agoda's marketing team for homepage placement, geo-targeted push notifications sent to app users in each origin country, and potential co-branding with TAT's official campaign materials. Establish a weekly dashboard tracking new bookings by nationality to measure campaign impact in real time and adjust promotional deployment accordingly."},
{q:"A Pattaya beach resort has a conversion rate of 1.8% versus the market average of 4.2%. Your investigation reveals four specific problems: the listing offers only non-refundable rates with no flexible option, there are no pool or beachfront photos despite this being the property's primary selling point, the minimum stay requirement is four nights, and a late checkout fee is charged but not disclosed on the listing. Rank your action priorities in order of conversion impact and justify the sequencing.",
clue:"💡 CVR optimization follows a clear return-on-impact hierarchy. Always sequence your interventions to address the highest-converting fix first — not the cheapest or easiest to implement.",
opts:["Priority one: lower the room rate by 30% immediately — price is universally the primary conversion driver for all beach resort markets","Priority one: add a free cancellation rate option alongside the non-refundable rate — policy flexibility delivers the largest single conversion lift, followed by adding beach and pool photos as the critical content fix, then removing the four-night minimum stay restriction, and finally adding transparent late checkout information","Priority one: generate 50 new positive reviews through a proactive review solicitation campaign before changing anything structural","Priority one: increase Agoda advertising spend to drive significantly more traffic volume — higher traffic will compensate for the low conversion rate through sheer scale"],
a:1,
ex:"CVR optimization is most effective when interventions are sequenced by impact magnitude rather than implementation ease. The correctly prioritized sequence and justification: First priority is adding a free cancellation rate option alongside the existing non-refundable rate, because policy flexibility consistently delivers a 25-40% conversion lift in competitive leisure beach markets. Pattaya has more than 200 beach resort listings — a non-refundable-only policy eliminates a traveler the moment they see it because equivalent flexible alternatives are one scroll away. The solution requires creating a second rate plan at a 12-15% premium over the non-refundable rate with free cancellation until 48-72 hours before arrival. Cost to the hotel is zero; conversion impact is immediate and substantial. Second priority is uploading professional beach and pool photography, because Pattaya travelers are emotionally purchasing the beach and swimming pool experience — if these are not visible in the first five photos of the listing, the emotional trigger to book never fires and no rate will compensate for that absence. A single professional photo shoot at ฿5,000-10,000 typically returns its cost within two to three additional bookings. Third priority is removing or significantly reducing the four-night minimum stay requirement. Bangkok to Pattaya is one of Thailand's most active short-trip corridors — the typical leisure visit is a Friday-to-Sunday getaway of two to three nights. A four-night minimum structurally eliminates approximately 65% of the natural demand for this destination before a potential guest even evaluates the rate. Reducing to a two-night minimum or eliminating the restriction entirely reopens access to the majority of the market. Fourth priority is adding transparent and positive late checkout language to the listing — replacing hidden charges with the phrase 'flexible late checkout available on request' in the amenities section. Hidden charges generate a specific and disproportionate pattern of negative reviews mentioning unexpected costs, which compound the CVR problem well beyond the booking stage. Fifth, and only after all four fixes are implemented and measured, consider selective rate adjustments if CVR remains below target. Lowering price on a listing with restrictive policies and absent content drives additional volume at permanently lower ADR without addressing the root cause of conversion failure."}
]},

{day:33,theme:"Advanced Negotiation & Long-Game Strategy",emoji:"🤝💡",zone:4,zoneLabel:"Elite Zone",
intro:"Day 33 — The final Elite challenge. These five scenarios test your commercial negotiation instincts, ethical judgment under pressure, and long-game strategic thinking in Thailand's sophisticated hotel partnership landscape.",
keyTerms:[["True Cost of Direct","Full cost of running competitive direct booking channels including technology, marketing, customer acquisition, and multilingual support — often 14-22%"],["Channel Independence Strategy","Hotel strategy to reduce OTA dependency — typically underestimates true cost and market reach gap"],["Structured Financial Dialogue","Facilitated repayment framework for a partner in financial distress, balancing guest protection and commercial recovery"]],
questions:[
{q:"A major Thai hotel group with 30 properties across Bangkok, Phuket, and Samui presents a business case showing that direct bookings save them 18% per booking compared to Agoda's commission. They have engaged a technology company to build a proprietary booking engine and plan to exit all OTA agreements in 12 months. You have a 90-minute strategic meeting. What is your approach?",
clue:"💡 The hotel's 18% saving calculation is mathematically real but dangerously incomplete. The true cost of a competitive direct channel is hidden in customer acquisition, technology maintenance, multilingual support, and low-season fill rate exposure.",
opts:["Acknowledge their business case is economically sound and agree with the strategy — respecting their commercial autonomy builds long-term goodwill","Immediately offer to match any commission reduction they request to retain all 30 properties at any cost","Present a comprehensive and evidence-based counter-case covering the true total cost of direct booking operations, Agoda's irreplaceable international market reach and low-season demand generation, and propose a hybrid partnership model where Agoda serves their international and new-guest acquisition needs while their direct channel serves repeat and domestic guests","Immediately reference exclusivity clauses in their partner agreements and signal potential legal action if they attempt early termination"],
a:2,
ex:"The hotel's business case shows commission saved but systematically hides the cost of what they are replacing. Structure your 90-minute meeting in four acts. In the first twenty minutes, present the true cost of direct. A competitive booking engine matching Agoda's capability requires ฿8-15 million in initial development plus ฿3-5 million annually in maintenance and feature updates. Google Ads investment to compete in high-intent travel search terms for Bangkok, Phuket, and Samui as three separate geographic markets costs ฿2-8 million per market annually. SEO investment to rank organically for travel search terms takes 18-24 months of sustained content and link-building effort before meaningful organic traffic materializes. Multilingual customer service in Thai, English, Chinese, Korean, and Arabic for guests across 30 properties requires dedicated team investment of ฿3-6 million annually. Payment processing and fraud management across 40 or more currencies and payment types costs 2-3% per transaction. The honest total cost of operating a genuinely competitive direct channel is 14-22% when fully and accurately accounted — not materially different from OTA commission. In the second twenty minutes, address market reach. Ask directly: 'What is your direct booking engine's plan to acquire a Chinese traveler who begins their hotel search on Ctrip or WeChat? What is your strategy to reach a Korean family planning their first Bangkok visit through Naver?' Agoda's established presence in these markets took 15 years and hundreds of millions in investment to build. In the third fifteen minutes, address low-season vulnerability. During Koh Samui's May-October low season, Agoda's global flash sale and promotional machine actively generates bookings through channels that a direct website cannot access. Ask how their direct channel will fill 30 properties during monsoon months without this demand generation infrastructure. In the final 35 minutes, propose the hybrid model. Agoda serves international travelers, first-visit guests, and low-season demand generation — segments where direct channels are structurally weak. Their direct channel serves repeat guests, domestic travelers, and loyalty program members — segments where direct is genuinely strong. This reframes the conversation from replacement to specialization, and removes the emotional either-or dynamic from the negotiation."},
{q:"An 8-room eco-resort on Koh Lipe has a 9.7 out of 10 review score, runs at 100% occupancy every high season through word-of-mouth and travel blog coverage alone, and has refused to join Agoda for three consecutive years. The owner believes OTAs bring the wrong type of guests who are incompatible with his property's philosophy and conservation mission. You are making your fourth visit. What is your most effective approach?",

a:2,

{q:"Two competing 5-star hotels in Bangkok — Hotel Grand Silom and Hotel Imperial Sathorn, both your active Agoda partners — each separately request in private meetings that you share the other hotel's specific Agoda performance data including occupancy rate, ADR, and RevPAR to use in their own competitive intelligence and sales strategy. How do you handle both requests?",

a:2,
ex:"This is a non-negotiable ethical boundary, and how you decline determines whether you strengthen or weaken both relationships simultaneously. The response framework for each hotel: Deliver the refusal clearly, confidently, and without apology — 'I am not able to share Hotel Imperial's confidential Agoda performance data with you. And I want you to know equally that I would never share your data with them or any other partner. This is a principle I apply completely consistently, and it is ultimately what protects your data and your trust in working with me.' This delivery signals that the refusal comes from professional integrity, not from bureaucratic policy — a meaningful distinction in relationship-based partnerships. Never hesitate, qualify, or apologize for this position, because any wavering invites continued pressure. Immediately following the refusal, offer genuine alternative value: aggregate and anonymized market intelligence such as 'I can share that top-performing 5-star properties in the Sathorn-Silom corridor are averaging 76% occupancy and approximately ฿6,200 ADR this quarter based on market-level data — this gives you a meaningful benchmark without exposing any specific partner.' If Agoda's partner portal includes a CompSet benchmarking tool, offer to run a formal analysis showing each hotel's position versus an anonymized composite of their competitive set — this provides the competitive intelligence they are seeking through an ethically constructed mechanism. Third, redirect the conversation to that hotel's specific opportunity: 'Rather than focusing on what your competitor is doing, let me share where I see your biggest addressable gap based on your own data. Your content score is 12 points below the top-performing properties in your set and that is directly affecting your search ranking — let us build a specific action plan around that.' This transforms a declined request into one of the most valuable conversations you have had with that partner in months. Document both requests internally, because repeated attempts to extract competitor data from a single partner may eventually require a direct conversation about appropriate engagement boundaries."},

ex:"This scenario requires simultaneous management of four distinct and partly competing priorities, and the order in which you address them matters profoundly. The first and genuinely non-negotiable priority is guest protection. Fourteen hundred guests hold confirmed reservations backed by payments they have already made. Before any financial settlement discussion occurs, you must assess with the hotel's operational team whether confirmed future bookings can actually be honored given the current cash flow crisis. If there is genuine operational uncertainty, immediately flag the situation to Agoda's Customer Experience leadership so they can begin preparing proactive guest communication protocols and identifying alternative accommodation options in Phuket for potential relocation. Guests who receive proactive advance notice and a quality alternative will understand; guests who arrive at a beachfront resort to find it closed will involve media, social media, and potentially regulatory authorities. The second priority is immediate internal escalation. A ฿24 million outstanding obligation is categorically beyond Market Manager authority or mandate. Escalate to Finance, Legal, and senior commercial leadership within 24 hours of confirming the situation, with a complete account of the hotel's circumstances, the outstanding obligation breakdown, the confirmed booking exposure, and your assessment of the relationship history. Your role from this point forward is relationship bridge and contextual advisor — not debt negotiator or legal representative. The third priority is genuine viability assessment. Work with ownership and management to answer the critical question honestly: is this a temporary liquidity crisis where the business is fundamentally viable and can recover within six to twelve months when tourism normalizes, or is this terminal distress where the property cannot survive regardless of any settlement arrangement? The answer fundamentally changes every subsequent decision. Temporary crisis may justify a structured repayment plan tied to future booking revenue — partial immediate payment plus monthly installments. Terminal distress requires immediate guest protection execution and asset recovery procedures through legal channels. The fourth priority is the listing decision, which is genuinely complex. Suspending the listing removes the hotel's primary remaining revenue generation mechanism, which directly reduces their ability to generate the cash flow needed to honor existing bookings and make settlement payments — this is a real strategic tension that Finance and Legal must evaluate carefully rather than defaulting to the punitive response. Throughout every stage, document every conversation, every verbal commitment, every decision and its rationale in writing with timestamps. If legal proceedings become necessary, your documentation of how the situation was managed will be essential for Agoda's position."}

const STATE = {
  screen: 'home', // home | intro | game | complete
  currentDay: null,
  qIndex: 0,
  score: 0,
  answers: [], // true/false per question
  timerSec: 300,
  timerRef: null,
  clueShown: false,
  answered: false,
  progress: JSON.parse(localStorage.getItem('ota_progress') || '{}'),
  // progress = { dayNum: { score, date, stars } }
};

function saveProgress(day, score, stars) {
  STATE.progress[day] = { score, stars, date: new Date().toISOString().split('T')[0] };
  localStorage.setItem('ota_progress', JSON.stringify(STATE.progress));
}

function getStreak() {
  const today = new Date().toISOString().split('T')[0];
  const dates = Object.values(STATE.progress).map(p => p.date).sort();
  if (!dates.length) return 0;
  let streak = 0;
  let d = new Date(today);
  while (true) {
    const ds = d.toISOString().split('T')[0];
    if (dates.includes(ds)) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  return streak;
}

function getStars(score, total) {
  const pct = score / (total * 10);
  if (pct >= 0.9) return 3;
  if (pct >= 0.7) return 2;
  if (pct >= 0.5) return 1;
  return 0;
}

function getDayStatus(dayNum) {
  if (STATE.progress[dayNum]) return 'done';
  // Allow playing today's next undone day OR any day
  return 'today';
}

function render() {
  if (STATE.screen === 'home') renderHome();
  else if (STATE.screen === 'intro') renderIntro();
  else if (STATE.screen === 'game') renderGame();
  else if (STATE.screen === 'complete') renderComplete();
}

function renderGame() {
  const day = DAYS[STATE.currentDay - 1];
  const q = day.questions[STATE.qIndex];
  const total = day.questions.length;
  const pct = Math.round((STATE.qIndex / total) * 100);
  const mins = Math.floor(STATE.timerSec / 60);
  const secs = String(STATE.timerSec % 60).padStart(2, '0');
  const timerClass = STATE.timerSec <= 30 ? 'urgent' : STATE.timerSec <= 60 ? 'warning' : '';

  app.innerHTML = `
    <div class="header" style="padding:14px 20px">
      <div class="header-icon" style="font-size:1.6rem">${day.emoji}</div>
      <div style="flex:1"><div style="font-size:.88rem;font-weight:700">Day ${day.day}: ${day.theme}</div>
        <div style="font-size:.75rem;opacity:.8">Question ${STATE.qIndex + 1} of ${total}</div></div>
      <div class="timer ${timerClass}">${mins}:${secs}</div>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>

    <div class="card" id="qcard">
      <div class="q-meta">
        <span class="q-num">Question ${STATE.qIndex + 1} / ${total}</span>
        <span style="font-size:.8rem;color:var(--muted)">${day.zoneLabel}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <button class="clue-btn" id="clueBtn" onclick="showClue()" ${STATE.clueShown ? 'style="display:none"' : ''}>
        💡 Show Clue
      </button>
      <div class="clue-reveal" id="clueBox" style="${STATE.clueShown ? 'display:block' : ''}">${q.clue}</div>
      <div class="options" id="opts">
        ${q.opts.map((opt, i) => `
          <button class="opt" id="opt${i}" onclick="answerQ(${i})">${String.fromCharCode(65+i)}. ${opt}</button>
        `).join('')}
      </div>
      <div class="explain-box" id="explainBox"></div>
    </div>
    <button class="btn btn-primary" id="nextBtn" style="display:none" onclick="nextQuestion()">
      ${STATE.qIndex + 1 < total ? 'Next Question →' : '🏁 See Results'}
    </button>`;

  // Restore answered state if needed
  if (STATE.answered) {
    applyAnsweredUI(q, -1); // -1 means already answered, just restore state
  }
}

function showClue() {
  STATE.clueShown = true;
  document.getElementById('clueBtn').style.display = 'none';
  const cb = document.getElementById('clueBox');
  cb.style.display = 'block';
}

function answerQ(chosen) {
  if (STATE.answered) return;
  STATE.answered = true;
  const day = DAYS[STATE.currentDay - 1];
  const q = day.questions[STATE.qIndex];
  const correct = chosen === q.a;

  if (correct) STATE.score += 10;
  STATE.answers[STATE.qIndex] = correct;

  // Style options
  const opts = document.querySelectorAll('.opt');
  opts.forEach((el, i) => {
    el.disabled = true;
    if (i === q.a) el.classList.add('correct');
    else if (i === chosen && !correct) el.classList.add('wrong');
  });

  // Show explanation
  const ex = document.getElementById('explainBox');
  ex.className = 'explain-box' + (correct ? '' : ' wrong-box');
  ex.innerHTML = (correct ? '✅ Correct! ' : '❌ Not quite. ') + q.ex;
  ex.style.display = 'block';

  // Show next button
  document.getElementById('nextBtn').style.display = 'block';

  // Stop clue button
  const cb = document.getElementById('clueBtn');
  if (cb) cb.style.display = 'none';
}

function applyAnsweredUI(q, chosen) {
  // Just show the explanation without re-scoring
  const ex = document.getElementById('explainBox');
  if (ex) { ex.style.display = 'block'; }
}

function nextQuestion() {
  const day = DAYS[STATE.currentDay - 1];
  STATE.qIndex++;
  STATE.answered = false;
  STATE.clueShown = false;
  if (STATE.qIndex >= day.questions.length) {
    endGame();
  } else {
    render();
  }
}

function endGame() {
  clearInterval(STATE.timerRef);
  const stars = getStars(STATE.score, DAYS[STATE.currentDay-1].questions.length);
  saveProgress(STATE.currentDay, STATE.score, stars);
  STATE.screen = 'complete';
  render();
  if (stars >= 2) launchConfetti();
}

  const day = DAYS[STATE.currentDay - 1];

  const msg = pct === 100 ? '🎉 Perfect Score! You\'re unstoppable!' :
    pct >= 80 ? '🌟 Excellent! Almost perfect!' :
    pct >= 60 ? '💪 Great effort! Review the explanations and try again.' :
    '📖 Keep going — practice makes perfect!';
  const nextDay = Math.min(STATE.currentDay + 1, 45);
  const done30 = STATE.currentDay === 30 && Object.keys(STATE.progress).length >= 30;

  app.innerHTML = `
    ${done30 ? `<div class="complete-banner">

        ${STATE.answers.map((correct, i) => `
          <div style="text-align:center">

          </div>`).join('')}
      </div>
    </div>

    <div class="streak-badge">
      <span class="s-num">${streak}🔥</span>
      <span class="s-label">Day Streak — Keep it up!</span>
    </div>

    <div class="key-terms card">
      <h4>📚 Today's Key Terms Recap</h4>
      ${day.keyTerms.map(([t,d]) => `<div class="term-row"><span class="term-name">${t}</span><span class="term-def">${d}</span></div>`).join('')}
    </div>

    ${STATE.currentDay < 30 ? `
    <div class="card" style="background:#fff8e1;border:1.5px solid #ffd54f">
      <div style="font-weight:700;margin-bottom:6px">⏭ Up Next: Day ${nextDay}</div>
      <div style="font-size:.88rem;color:var(--muted);margin-bottom:12px">${DAYS[nextDay-1].emoji} ${DAYS[nextDay-1].theme} · ${DAYS[nextDay-1].zoneLabel}</div>
      <button class="btn-start" onclick="startDay(${nextDay})">▶ Start Day ${nextDay} Now</button>
    </div>` : ''}

    <div style="display:flex;gap:10px;margin-top:4px">
      <button class="btn btn-secondary" style="flex:1" onclick="startDay(${STATE.currentDay})">🔄 Replay Day ${STATE.currentDay}</button>
      <button class="btn btn-secondary" style="flex:1" onclick="STATE.screen='home';render()">🏠 Home</button>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════════════
function startDay(dayNum) {
  STATE.currentDay = dayNum;
  STATE.qIndex = 0;
  STATE.score = 0;
  STATE.answers = [];
  STATE.timerSec = 300;
  STATE.clueShown = false;
  STATE.answered = false;
  STATE.screen = 'intro';
  render();
  window.scrollTo(0,0);
}

function startGame() {
  STATE.screen = 'game';
  render();
  startTimer();
  window.scrollTo(0,0);
}

function startTimer() {
  clearInterval(STATE.timerRef);
  STATE.timerRef = setInterval(() => {
    STATE.timerSec--;
    if (STATE.timerSec <= 0) {
      clearInterval(STATE.timerRef);
      // Auto-advance if time's up
      if (!STATE.answered) answerQ(-1); // Force reveal
    }
    // Update timer display only
    const el = document.querySelector('.timer');
    if (el) {
      const m = Math.floor(STATE.timerSec / 60);
      const s = String(STATE.timerSec % 60).padStart(2,'0');
      el.textContent = `${m}:${s}`;
      el.className = 'timer' + (STATE.timerSec <= 30 ? ' urgent' : STATE.timerSec <= 60 ? ' warning' : '');
    }
  }, 1000);
}

// ═══════════════════════════════════════════════════════════════
//  CONFETTI
// ═══════════════════════════════════════════════════════════════
function launchConfetti() {
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const pieces = Array.from({length: 80}, () => ({
    x: Math.random() * canvas.width,
    y: -10 - Math.random() * 100,
    w: 8 + Math.random() * 8,
    h: 6 + Math.random() * 6,
    color: ['#e53935','#ff6d00','#ffd600','#43a047','#1e88e5'][Math.floor(Math.random()*5)],
    r: Math.random() * Math.PI * 2,
    dr: (Math.random() - 0.5) * 0.15,
    dy: 2 + Math.random() * 3,
    dx: (Math.random() - 0.5) * 2
  }));
  let frame = 0;
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => {
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.r);
      ctx.fillStyle = p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
      p.y += p.dy; p.x += p.dx; p.r += p.dr;
    });
    frame++;
    if (frame < 150) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
render();
</script>

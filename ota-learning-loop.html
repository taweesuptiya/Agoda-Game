<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏨 OTA Daily Learning Loop | 45-Day Mastery</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --red:#e53935;--red2:#c62828;--orange:#ff6d00;--green:#2e7d32;
  --green-light:#e8f5e9;--red-light:#ffebee;--blue:#1565c0;
  --bg:#f4f4f8;--card:#fff;--text:#1a1a2e;--muted:#757575;
  --border:#e0e0e0;--shadow:0 2px 12px rgba(0,0,0,.10);
  --shadow2:0 6px 24px rgba(0,0,0,.13);
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);min-height:100vh;color:var(--text)}
#app{max-width:700px;margin:0 auto;padding:16px}

/* ── HEADER ── */
.header{background:linear-gradient(135deg,var(--red),#b71c1c);color:#fff;border-radius:18px;
  padding:22px 28px;margin-bottom:20px;display:flex;align-items:center;gap:14px;
  box-shadow:0 4px 18px rgba(229,57,53,.35)}
.header-icon{font-size:2.4rem}
.header h1{font-size:1.3rem;font-weight:700;letter-spacing:-.3px}
.header p{font-size:.82rem;opacity:.85;margin-top:2px}

/* ── PROGRESS OVERVIEW ── */
.overview-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:20px}
.day-dot{border-radius:10px;padding:6px 0;text-align:center;cursor:pointer;
  font-size:.68rem;font-weight:600;transition:transform .15s,box-shadow .15s;border:2px solid transparent}
.day-dot:hover{transform:scale(1.08);box-shadow:var(--shadow)}
.day-dot.done{background:#c8e6c9;color:#1b5e20;border-color:#4caf50}
.day-dot.today{background:var(--red);color:#fff;border-color:var(--red2);box-shadow:0 2px 8px rgba(229,57,53,.4)}
.day-dot.locked{background:#f0f0f0;color:#bbb}
.day-dot .dot-num{font-size:.82rem;font-weight:700;display:block}
.day-dot .dot-star{font-size:.65rem}

/* ── CARD ── */
.card{background:var(--card);border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:var(--shadow)}

/* ── DAY INTRO ── */
.day-banner{background:linear-gradient(135deg,var(--red),var(--orange));color:#fff;
  border-radius:16px;padding:22px 24px;margin-bottom:16px;box-shadow:0 4px 18px rgba(229,57,53,.3)}
.day-banner .day-label{font-size:.78rem;font-weight:600;opacity:.8;text-transform:uppercase;letter-spacing:.5px}
.day-banner .day-title{font-size:1.4rem;font-weight:800;margin:4px 0 6px}
.day-banner .day-intro{font-size:.88rem;opacity:.9;line-height:1.55}
.difficulty-badge{display:inline-block;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);
  color:#fff;border-radius:20px;padding:3px 12px;font-size:.75rem;font-weight:600;margin-top:10px}

/* ── QUESTION ── */
.q-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.q-num{font-size:.78rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.timer{font-size:1rem;font-weight:700;color:var(--red);background:#fff0f0;
  padding:4px 12px;border-radius:20px;border:1.5px solid #ffcdd2}
.timer.warning{color:#e65100;background:#fff3e0;border-color:#ffcc02;animation:pulse 1s infinite}
.timer.urgent{color:#b71c1c;background:#ffebee;border-color:var(--red);animation:pulse .5s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}

.q-text{font-size:1.1rem;font-weight:700;line-height:1.5;margin-bottom:12px}
.clue-btn{background:#fff8e1;border:1.5px dashed #ffb300;color:#e65100;border-radius:10px;
  padding:8px 16px;font-size:.82rem;font-weight:600;cursor:pointer;width:100%;margin-bottom:12px;
  transition:background .2s}
.clue-btn:hover{background:#fff3cd}
.clue-reveal{background:#fffde7;border:1.5px solid #ffd54f;border-radius:10px;
  padding:10px 14px;font-size:.85rem;color:#5d4037;margin-bottom:14px;display:none;
  animation:fadeIn .3s}

/* ── OPTIONS ── */
.options{display:flex;flex-direction:column;gap:10px}
.opt{background:#fafafa;border:2px solid var(--border);border-radius:12px;
  padding:13px 16px;font-size:.92rem;cursor:pointer;transition:all .18s;
  text-align:left;font-family:inherit;color:var(--text);font-weight:500}
.opt:hover:not(:disabled){background:#fff5f5;border-color:var(--red);color:var(--red)}
.opt.correct{background:var(--green-light)!important;border-color:#4caf50!important;color:#1b5e20!important}
.opt.wrong{background:var(--red-light)!important;border-color:var(--red)!important;color:var(--red)!important;
  animation:shake .3s}
.opt.reveal-correct{background:var(--green-light)!important;border-color:#4caf50!important;color:#1b5e20!important}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

/* ── EXPLANATION ── */
.explain-box{background:#e8f5e9;border-left:4px solid #4caf50;border-radius:0 10px 10px 0;
  padding:12px 16px;font-size:.85rem;line-height:1.55;color:#2e7d32;display:none;animation:fadeIn .4s;margin-top:12px}
.explain-box.wrong-box{background:#fff8e1;border-color:#ff8f00;color:#5d4037}

/* ── BUTTONS ── */
.btn{border-radius:12px;padding:12px 28px;font-size:.95rem;font-weight:700;
  cursor:pointer;border:none;transition:all .18s;font-family:inherit}
.btn-primary{background:var(--red);color:#fff;width:100%;margin-top:14px}
.btn-primary:hover{background:var(--red2);transform:translateY(-1px);box-shadow:0 4px 14px rgba(229,57,53,.4)}
.btn-secondary{background:#f5f5f5;color:var(--text);border:2px solid var(--border)}
.btn-secondary:hover{background:#efefef}
.btn-start{background:linear-gradient(135deg,var(--red),var(--orange));color:#fff;
  width:100%;font-size:1.05rem;padding:15px;border-radius:14px;border:none;cursor:pointer;
  font-family:inherit;font-weight:700;margin-top:16px;transition:transform .18s,box-shadow .18s;
  box-shadow:0 4px 18px rgba(229,57,53,.35)}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(229,57,53,.45)}

/* ── PROGRESS BAR ── */
.progress-bar-wrap{height:8px;background:#f0f0f0;border-radius:4px;margin-bottom:16px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(to right,var(--red),var(--orange));border-radius:4px;transition:width .4s}

/* ── SCORE SCREEN ── */
.score-big{font-size:3.5rem;font-weight:800;color:var(--red);text-align:center;
  margin:12px 0 4px;line-height:1}
.score-label{text-align:center;color:var(--muted);font-size:.88rem;margin-bottom:20px}
.stars{text-align:center;font-size:2.2rem;margin-bottom:14px}
.key-terms{background:#fafafa;border-radius:12px;padding:16px;margin-top:12px}
.key-terms h4{font-size:.82rem;color:var(--muted);font-weight:600;text-transform:uppercase;
  letter-spacing:.4px;margin-bottom:10px}
.term-row{display:flex;justify-content:space-between;padding:7px 0;
  border-bottom:1px solid var(--border);font-size:.85rem;gap:8px}
.term-row:last-child{border-bottom:none}
.term-name{font-weight:700;color:var(--text);min-width:110px}
.term-def{color:var(--muted);font-size:.82rem;line-height:1.4}
.streak-badge{background:linear-gradient(135deg,var(--orange),#ff8f00);color:#fff;
  border-radius:14px;padding:10px 20px;text-align:center;margin-bottom:16px}
.streak-badge .s-num{font-size:2rem;font-weight:800;display:block}
.streak-badge .s-label{font-size:.78rem;opacity:.85}

/* ── HOME ── */
.home-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:16px 0}
.stat-box{background:var(--card);border-radius:14px;padding:16px;text-align:center;box-shadow:var(--shadow)}
.stat-box .s-val{font-size:2rem;font-weight:800;color:var(--red);display:block}
.stat-box .s-lbl{font-size:.75rem;color:var(--muted);margin-top:2px}
.zone-pill{display:inline-block;border-radius:20px;padding:3px 12px;
  font-size:.72rem;font-weight:700;margin-bottom:6px}
.zone-1{background:#e8f5e9;color:#2e7d32}
.zone-2{background:#fff3e0;color:#e65100}
.zone-3{background:#ffebee;color:#c62828}

/* ── MISC ── */
.confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}
.divider{height:1px;background:var(--border);margin:16px 0}
.text-muted{color:var(--muted);font-size:.83rem}
.mt8{margin-top:8px}.mt16{margin-top:16px}
.flex-row{display:flex;gap:10px;align-items:center}
.emoji-big{font-size:2.5rem;text-align:center;display:block;margin:8px 0}
.complete-banner{background:linear-gradient(135deg,#1b5e20,#2e7d32);color:#fff;
  border-radius:16px;padding:24px;text-align:center;margin-bottom:16px}
.complete-banner h2{font-size:1.5rem;font-weight:800}
.complete-banner p{opacity:.85;margin-top:6px;font-size:.9rem}

@media(max-width:480px){
  #app{padding:10px}
  .overview-grid{grid-template-columns:repeat(5,1fr)}
  .home-stats{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div id="app"></div>
<canvas class="confetti" id="confetti"></canvas>

<script>
// ═══════════════════════════════════════════════════════════════
//  30-DAY OTA CURRICULUM  (5 questions × 30 days = 150 Q's)
// ═══════════════════════════════════════════════════════════════
const DAYS = [
{day:1,theme:"What is an OTA?",emoji:"🌐",zone:1,zoneLabel:"Beginner Zone",
intro:"Welcome to Day 1! OTA stands for Online Travel Agency — the industry you just joined. Let's nail the fundamentals.",
keyTerms:[["OTA","Online Travel Agency — digital marketplace for travel bookings"],["Commission","% of booking value paid to OTA by hotel"],["Property","Any bookable accommodation on an OTA platform"]],
questions:[
{q:"What does OTA stand for?",clue:"💡 Think of how travelers book hotels online, without calling the hotel directly...",
opts:["Online Travel Agency","Overseas Tour Advisor","Operational Travel Authority","Official Tourism Association"],a:0,
ex:"OTA = Online Travel Agency. Agoda, Booking.com, and Expedia are all OTAs — digital marketplaces that connect travelers with accommodations."},
{q:"Which of these is an OTA?",clue:"💡 An OTA is a marketplace listing many hotels, not a single hotel or airline...",
opts:["Marriott Hotels","Singapore Airlines","Agoda.com","Hertz Car Rental"],a:2,
ex:"Agoda is an OTA — a marketplace aggregating thousands of hotels. Marriott and Singapore Airlines are direct suppliers, not OTAs."},
{q:"How does an OTA primarily earn revenue?",clue:"💡 Hotels pay for every booking that comes through the platform...",
opts:["Monthly fees from travelers","Commission on each completed booking","Government tourism grants","Airline ticket surcharges"],a:1,
ex:"OTAs earn commission (typically 15–25%) from hotels for each booking. The guest pays the OTA, which remits the net amount to the hotel."},
{q:"Agoda is owned by which company?",clue:"💡 This company also owns Booking.com and Priceline...",
opts:["Alibaba Group","Booking Holdings","Expedia Group","Trip.com Group"],a:1,
ex:"Agoda is part of Booking Holdings — the world's largest travel group, also parent of Booking.com, Priceline, Kayak, and OpenTable."},
{q:"In OTA language, what is a 'property'?",clue:"💡 It's where guests sleep when they travel...",
opts:["A real estate investment","Any bookable accommodation (hotel, villa, hostel, etc.)","An OTA regional office","A vacation package deal"],a:1,
ex:"'Property' in OTA terms = any accommodation listed on the platform — hotels, boutique guesthouses, villas, hostels, resorts, and more."}
]},

{day:2,theme:"The OTA Landscape",emoji:"🗺️",zone:1,zoneLabel:"Beginner Zone",
intro:"Day 2! Meet the major players in the OTA world — your ecosystem of competitors and partners.",
keyTerms:[["Booking Holdings","Parent of Agoda, Booking.com, Priceline, Kayak"],["Metasearch","Price comparison sites like Trivago & Google Hotels"],["Airbnb","Peer-to-peer home sharing platform"]],
questions:[
{q:"Which OTA is particularly dominant in the Asia-Pacific market?",clue:"💡 Founded and headquartered in Bangkok, Thailand...",
opts:["Expedia","Hotels.com","Agoda","Trivago"],a:2,
ex:"Agoda was founded in Bangkok and has exceptionally strong coverage and brand recognition across Asia-Pacific — its home turf."},
{q:"Booking.com's tiered loyalty program is called?",clue:"💡 The name suggests being smart or brilliant...",
opts:["Star Rewards","Elite Club","Genius","Diamond Status"],a:2,
ex:"Booking.com's loyalty program is 'Genius' — offering discounts at Genius Level 1, 2, and 3 based on booking history."},
{q:"Airbnb primarily disrupted the market with what concept?",clue:"💡 Their original name had 'Air' and 'Breakfast' in it...",
opts:["Ultra-budget hotel chains","Peer-to-peer home and apartment sharing","Business travel management","Airline seat upgrades"],a:1,
ex:"Airbnb = 'Air Bed & Breakfast.' It created a peer-to-peer marketplace where homeowners rent out rooms or entire homes to travelers."},
{q:"Which is a 'metasearch' engine, NOT a booking OTA?",clue:"💡 It compares prices but you ultimately book on another site...",
opts:["Agoda","Booking.com","Trivago","Expedia"],a:2,
ex:"Trivago is a metasearch engine — it compares hotel prices across OTAs and direct sites, then redirects users to book. It's owned by Expedia Group."},
{q:"Ctrip rebranded globally to which name?",clue:"💡 The new name suggests global travel and exploration...",
opts:["TravelPro","Trip.com","JetGo","ChinaTravel"],a:1,
ex:"Ctrip (China's largest OTA) rebranded to Trip.com Group for its international expansion — it's one of the world's largest travel service companies."}
]},

{day:3,theme:"Hotel–OTA Partnership",emoji:"🤝",zone:1,zoneLabel:"Beginner Zone",
intro:"Day 3! Hotels are your partners (clients). Understanding how they work with OTAs is essential for your role.",
keyTerms:[["Partner Agreement","Contract between hotel and OTA defining terms"],["Extranet","Hotel's backend portal to manage their OTA listing"],["Market Manager","OTA employee who manages hotel partnerships"]],
questions:[
{q:"What is the typical OTA commission range charged to hotels?",clue:"💡 It's somewhere between one-fifth and one-quarter of the booking...",
opts:["1–5%","5–10%","15–25%","40–50%"],a:2,
ex:"OTAs typically charge hotels 15–25% commission. Agoda's exact rate varies by contract and market, but this range is industry standard."},
{q:"When a hotel first joins Agoda's platform, this process is called?",clue:"💡 It's like starting a new job — your first day...",
opts:["Activation","Onboarding","Launching","Registration"],a:1,
ex:"'Onboarding' is the process of getting a new hotel set up on the OTA platform — signing contracts, uploading content, and going live."},
{q:"Who at Agoda is responsible for managing a hotel partner relationship?",clue:"💡 They manage a geographic market area...",
opts:["Revenue Manager","Content Specialist","Market Manager / Partner Manager","IT Support"],a:2,
ex:"A Market Manager (or Partner Manager) is the Agoda person who manages relationships with hotel partners — your likely role!"},
{q:"What information does a hotel need to provide to list on an OTA?",clue:"💡 Think of what a traveler needs to decide whether to book...",
opts:["Only the address","Photos, rates, room types, amenities, policies, and description","Just the price","Only the owner's contact info"],a:1,
ex:"Complete listings include: professional photos, rates, room types, amenities, property description, location, cancellation policies, and check-in info."},
{q:"What is an 'extranet' in hotel-OTA terminology?",clue:"💡 It's a portal where hotels log in to manage their listing...",
opts:["A public-facing website","The hotel's private backend management portal on the OTA","An external travel agency","A type of hotel amenity"],a:1,
ex:"The extranet is the hotel's backend dashboard on the OTA — where they update rates, availability, photos, policies, and view booking data."}
]},

{day:4,theme:"Occupancy Rate",emoji:"📊",zone:1,zoneLabel:"Beginner Zone",
intro:"Day 4! Occupancy Rate is one of the most fundamental hotel metrics. You'll use this in every client conversation.",
keyTerms:[["Occupancy Rate","Rooms sold ÷ Total rooms × 100%"],["Full House","100% occupancy — all rooms sold"],["Stop Sell","Blocking bookings when fully booked"]],
questions:[
{q:"How is occupancy rate calculated?",clue:"💡 Divide rooms sold by total rooms, multiply by 100...",
opts:["(Rooms sold ÷ Room rate) × 100","(Rooms sold ÷ Total rooms available) × 100","(Revenue ÷ Rooms) × 100","(Guests ÷ Staff) × 100"],a:1,
ex:"Occupancy Rate = (Rooms Sold ÷ Total Rooms Available) × 100. Simple but powerful — the backbone of hotel performance."},
{q:"A hotel has 200 rooms. Last night, 150 were occupied. Occupancy rate?",clue:"💡 150 out of 200 = ?%",
opts:["65%","70%","75%","80%"],a:2,
ex:"150 ÷ 200 × 100 = 75% occupancy. Solid performance — most hotels target 70–85% as a sustainable range."},
{q:"When a hotel has very HIGH occupancy (e.g. 95%), what typically happens to rates?",clue:"💡 High demand + limited supply = ?",
opts:["Rates drop dramatically","Rates stay exactly the same","Rates tend to increase","The hotel closes"],a:2,
ex:"High occupancy signals high demand. Smart revenue management raises rates when demand exceeds supply — like airline pricing."},
{q:"What does 'Full House' mean in hotel language?",clue:"💡 No more rooms to sell...",
opts:["Only the function rooms are booked","The hotel restaurant is full","100% occupancy — every room is sold","The lobby is crowded"],a:2,
ex:"'Full House' = 100% occupancy. The hotel is completely sold out. This triggers a 'Stop Sell' on all booking channels including the OTA."},
{q:"Why is occupancy rate alone NOT enough to measure hotel success?",clue:"💡 A hotel could be full but charging very little...",
opts:["Because it's too hard to calculate","Because it ignores the rate charged per room","Because it only counts weekdays","Because OTAs don't track it"],a:1,
ex:"Occupancy alone doesn't show revenue quality. A hotel at 100% with $20/room is worse than 80% at $150/room — hence why ADR and RevPAR matter."}
]},

{day:5,theme:"ADR – Average Daily Rate",emoji:"💰",zone:1,zoneLabel:"Beginner Zone",
intro:"Day 5! ADR tells you HOW MUCH hotels earn per sold room. It's half of the RevPAR equation you'll master tomorrow.",
keyTerms:[["ADR","Average Daily Rate = Room Revenue ÷ Rooms Sold"],["CompSet","Competitive Set — hotels used for benchmarking ADR"],["Pricing Strategy","How a hotel sets its room rates"]],
questions:[
{q:"ADR stands for?",clue:"💡 It's the average amount charged per night per room...",
opts:["Annual Daily Revenue","Average Daily Rate","Adjusted Demand Ratio","Available Daily Rooms"],a:1,
ex:"ADR = Average Daily Rate. It measures the average revenue earned per sold room per night. A core hotel performance metric."},
{q:"How is ADR calculated?",clue:"💡 Divide total room revenue by the number of rooms actually sold...",
opts:["Total revenue ÷ Total rooms","Room revenue ÷ Rooms sold","Occupancy × Room price","Revenue ÷ Number of guests"],a:1,
ex:"ADR = Total Room Revenue ÷ Number of Rooms Sold. Only sold rooms count — not empty ones. Compare with RevPAR which uses ALL rooms."},
{q:"Hotel earned $15,000 room revenue by selling 100 rooms. ADR = ?",clue:"💡 $15,000 divided by 100 rooms = ?",
opts:["$100","$150","$200","$250"],a:1,
ex:"$15,000 ÷ 100 = $150 ADR. Every sold room earned an average of $150 per night."},
{q:"What is a hotel's 'CompSet'?",clue:"💡 Hotels benchmark themselves against similar rivals...",
opts:["A software tool for pricing","A group of similar competitor hotels used for comparison","A type of hotel room","A discount program"],a:1,
ex:"CompSet = Competitive Set. A hotel selects 5–8 similar competing hotels to benchmark ADR, occupancy, and RevPAR against. Agoda provides this data."},
{q:"If a hotel's ADR is much lower than its CompSet, what should it consider?",clue:"💡 Being too cheap relative to competition is leaving money on the table...",
opts:["Immediately close the hotel","Reviewing and potentially raising its rates","Lowering rates even further","Removing itself from OTAs"],a:1,
ex:"If ADR lags the CompSet, the hotel may be underpricing. But context matters — lower service levels or fewer amenities may justify lower rates."}
]},

{day:6,theme:"RevPAR — The Key Metric",emoji:"📈",zone:1,zoneLabel:"Beginner Zone",
intro:"Day 6! RevPAR combines occupancy AND rate into one powerful number. Mastering this impresses any hotelier.",
keyTerms:[["RevPAR","Revenue Per Available Room = ADR × Occupancy %"],["TRevPAR","Total Revenue Per Available Room (all hotel revenue)"],["Index","RevPAR compared to competitive set (100 = parity)"]],
questions:[
{q:"RevPAR stands for?",clue:"💡 It measures revenue across ALL rooms, not just sold ones...",
opts:["Revenue Per Available Room","Rate Per Available Room","Revenue Per Adjusted Rate","Room Pricing And Revenue"],a:0,
ex:"RevPAR = Revenue Per Available Room. Unlike ADR, it accounts for BOTH the rate charged AND the occupancy — a more complete picture."},
{q:"How do you calculate RevPAR using ADR and Occupancy?",clue:"💡 Multiply the two key metrics together...",
opts:["ADR + Occupancy %","ADR ÷ Occupancy %","ADR × Occupancy %","ADR – Occupancy %"],a:2,
ex:"RevPAR = ADR × Occupancy Rate. Example: ADR $120 × 75% occupancy = RevPAR $90. Simple and powerful."},
{q:"ADR is $200 and occupancy is 70%. What is RevPAR?",clue:"💡 $200 × 0.70 = ?",
opts:["$100","$120","$140","$160"],a:2,
ex:"$200 × 70% = $140 RevPAR. This means the hotel earns $140 for every available room (sold or not) each night."},
{q:"Why is RevPAR better than just tracking occupancy OR ADR alone?",clue:"💡 You need both price and volume to measure success...",
opts:["RevPAR is easier to calculate","It combines volume (occupancy) AND pricing (ADR) into one metric","RevPAR is older so more trusted","Hotels prefer RevPAR for tax purposes"],a:1,
ex:"RevPAR captures the full picture: a hotel could have high ADR but low occupancy, or high occupancy but rock-bottom rates. RevPAR reveals both problems."},
{q:"What does a 'RevPAR Index' above 100 mean?",clue:"💡 100 = exactly equal to competitors; what does above mean?",
opts:["The hotel needs to lower rates","The hotel is outperforming its competitive set","The hotel has 100% occupancy","The hotel must raise prices immediately"],a:1,
ex:"RevPAR Index >100 = hotel is outperforming its competitive set. Index of 110 = earning 10% more RevPAR than the market average. Great news for partners!"}
]},

{day:7,theme:"Room Types & Configurations",emoji:"🛏️",zone:1,zoneLabel:"Beginner Zone",
intro:"Day 7! Room types are core product knowledge. Guests and hotels talk about these constantly — know them cold.",
keyTerms:[["Twin","Room with two separate single beds"],["Suite","Room with separate living and sleeping areas"],["Superior","Step above Standard — better view or size"]],
questions:[
{q:"What is a 'Twin' room?",clue:"💡 Think of the word 'twins' — two of something...",
opts:["A room with one large bed for two","A room with two separate single beds","Two connecting rooms","A room with a bunk bed"],a:1,
ex:"A Twin room has two separate single beds — ideal for friends traveling together or colleagues sharing a room."},
{q:"What defines a 'Suite'?",clue:"💡 It has more than just a bedroom...",
opts:["The largest room in a hotel","A room with a separate living area AND bedroom","Any room with a sea view","A room costing over $500/night"],a:1,
ex:"A Suite has distinct living and sleeping areas — typically a sitting room and separate bedroom. Presidential Suite = most premium suite."},
{q:"What does 'Superior' mean in hotel room categorization?",clue:"💡 Superior = better than Standard...",
opts:["The cheapest room available","Exactly the same as Standard","A step up from Standard (better view, floor, or size)","A room with butler service"],a:2,
ex:"'Superior' rooms are one tier above Standard — often on higher floors, with better views, or slightly more space. Hierarchy: Standard < Superior < Deluxe < Suite."},
{q:"A 'King' room means?",clue:"💡 Named after royalty — it's the biggest bed size...",
opts:["A room with a king-sized bed (one large bed)","A room with two king-sized beds","The most expensive room","A historical-themed room"],a:0,
ex:"King room = one king-sized bed (roughly 76\"×80\"). Ideal for couples. Different from 'Double' which has a double/queen bed."},
{q:"What does 'connecting rooms' mean?",clue:"💡 Think of families wanting adjacent rooms...",
opts:["Two rooms that share a balcony","Two rooms with an internal door between them","Rooms connected to the restaurant","Rooms with smart home technology"],a:1,

{day:11,theme:"Yield Management",emoji:"🎯",zone:2,zoneLabel:"Intermediate Zone",
intro:"Day 11! Yield management is the art of selling the right room at the right time to the right guest at the right price.",
keyTerms:[["Yield Management","Optimizing pricing based on demand to maximize revenue"],["Perishable Inventory","Unsold hotel rooms = lost revenue forever"],["High Season","Period of peak demand and higher rates"]],
questions:[
{q:"Yield management in hotels is best described as?",clue:"💡 Airlines perfected this — hotels adopted it...",
opts:["Making hotel beds for guests","Selling the right room, to the right guest, at the right price, at the right time","Managing hotel food and beverage yields","Counting the number of check-ins per day"],a:1,
ex:"Yield management maximizes revenue by adjusting prices based on demand signals — events, seasons, booking pace, competitive rates. Airlines pioneered it; hotels followed."},
{q:"Why are hotel rooms called 'perishable inventory'?",clue:"💡 Like fresh food, if not sold today, the opportunity is gone...",
opts:["Because rooms deteriorate over time","An unsold room tonight can never be sold — that revenue is lost forever","Because hotel bedding expires","Because guests sometimes damage rooms"],a:1,
ex:"A hotel room is perishable — an empty room on Tuesday can never be resold on Wednesday. This urgency drives yield management: better a discounted room than an empty one."},
{q:"A major music festival is announced for your partner hotel's city. What should the hotel do to rates?",clue:"💡 High demand event = pricing opportunity...",
opts:["Lower rates to attract festival goers","Keep rates exactly the same","Raise rates — demand will spike during the event","Close the hotel for the event"],a:2,
ex:"Events drive demand spikes. Smart revenue management raises rates before competitors do. Hotels that fail to adjust yield management lose significant revenue."},
{q:"What is 'high season' in hotel terminology?",clue:"💡 When everyone wants to travel to a destination...",
opts:["The period when the hotel is under renovation","The time of peak demand — usually holidays, school breaks, or local events","Any month with the letter 'R' in it","January to March in all markets"],a:1,
ex:"High season = peak demand period. This varies by destination. Beach resorts peak in summer; ski resorts peak in winter; city hotels peak during major events or conferences."},
{q:"A hotel sees bookings are very slow 3 weeks before a date. What yield management action is most appropriate?",clue:"💡 Empty rooms approaching = time to stimulate demand...",
opts:["Raise rates to maintain premium image","Do nothing — guests will come eventually","Launch a promotion or lower rates to stimulate bookings","Close the hotel for maintenance"],a:2,
ex:"If pace is slow, smart yield management involves promotions, rate reductions, or targeted deals through OTAs to fill those rooms before the date arrives."}
]},

{day:12,theme:"Dynamic Pricing",emoji:"📉📈",zone:2,zoneLabel:"Intermediate Zone",
intro:"Day 12! Dynamic pricing means rates change in real-time based on demand signals. It's how smart hotels maximize revenue.",
keyTerms:[["Dynamic Pricing","Rates that change automatically based on demand"],["RMS","Revenue Management System — software that automates pricing"],["Demand Signal","Factor that triggers a price change (event, season, competitor rates)"]],
questions:[
{q:"Dynamic pricing means?",clue:"💡 'Dynamic' = changing, not fixed...",
opts:["Rates are fixed for the whole year","Rates change in real-time based on supply and demand","Rates are set by the government","Discounts given to loyal customers"],a:1,
ex:"Dynamic pricing = flexible pricing that adjusts automatically (or manually) based on demand, competition, booking pace, and market conditions. Standard industry practice."},
{q:"A Revenue Management System (RMS) does what?",clue:"💡 It's software that helps hotels price automatically...",
opts:["Manages housekeeping schedules","Automates rate optimization based on demand data and algorithms","Processes guest check-ins","Handles hotel accounting"],a:1,
ex:"An RMS (like IDeaS or Duetto) automatically analyzes booking data, competitor rates, and demand signals to recommend or set optimal rates in real-time."},
{q:"It's a rainy Tuesday in January — a beach resort's slowest period. Dynamic pricing suggests?",clue:"💡 Low demand calls for competitive pricing...",
opts:["Raise rates to cover costs","Maintain the same rate as peak season","Lower rates or launch a promo to stimulate bookings","Remove the hotel from all OTAs"],a:2,
ex:"Low demand periods call for competitive, stimulative pricing. Dynamic pricing lowers rates or triggers promotions to attract price-sensitive leisure travelers."},
{q:"'Last Minute Deals' are an example of dynamic pricing designed to?",clue:"💡 Hotels don't want empty rooms tomorrow...",
opts:["Reward guests who booked early","Fill unsold rooms close to arrival date by offering discounts","Only serve business travelers","Punish guests who cancel"],a:1,
ex:"Last-minute deals target travelers who are flexible — offering discounts to fill rooms that would otherwise go empty. Better some revenue than zero."},
{q:"Which factor does NOT typically drive dynamic pricing changes?",clue:"💡 Pricing is driven by data, not personal feelings...",
opts:["A major conference in the city","School holiday period","The hotel owner's personal mood","A competitor suddenly lowering their rates"],a:2,
ex:"Dynamic pricing responds to data: events, seasons, competitor moves, booking pace. The owner's mood is not a data signal — pricing should be objective and market-driven."}
]},

{day:13,theme:"Rate Parity",emoji:"⚖️",zone:2,zoneLabel:"Intermediate Zone",
intro:"Day 13! Rate parity is a hot topic in OTA partnerships. Understanding it helps you navigate conversations with hotel partners.",
keyTerms:[["Rate Parity","Same rate offered across all booking channels"],["Best Price Guarantee","OTA promise to match lowest price anywhere"],["Retail Rate","Standard publicly available rate"]],
questions:[
{q:"Rate parity means?",clue:"💡 'Parity' = equality. All channels must be equal...",
opts:["Hotels charge more on OTAs than direct","The same room rate is offered across all booking channels","OTAs always have lower prices than direct","Hotels can set different prices for each OTA"],a:1,
ex:"Rate parity requires hotels to offer the same rate across all channels (OTAs, direct website, phone bookings). OTAs enforce this to stay price-competitive."},
{q:"Why do OTAs require rate parity from hotel partners?",clue:"💡 If the hotel's own site is cheaper, why would anyone book on the OTA?",
opts:["To prevent hotels from making too much money","So OTAs remain price-competitive and guests have no reason to book elsewhere","Because government regulations require it","To protect small hotels from big chains"],a:1,
ex:"Rate parity protects the OTA's value proposition. If hotels offer lower rates on their own site, travelers will bypass the OTA — hurting the OTA's business."},
{q:"A hotel secretly offers 10% lower rates on its own website than on Agoda. This violates?",clue:"💡 It's breaking the equal pricing agreement...",
opts:["Nothing — hotels can charge what they want","The rate parity clause in its OTA partner agreement","Environmental regulations","Staff employment laws"],a:1,
ex:"Offering lower rates outside the OTA violates rate parity. Agoda may respond by reducing the hotel's ranking, removing promotions, or escalating to contract review."},
{q:"What is a hotel's 'Best Price Guarantee' typically about?",clue:"💡 OTAs promise they won't be beaten on price...",
opts:["The hotel guarantees its rooms are the best quality","OTA promises guests won't find a lower public rate elsewhere","Hotels guarantee no price changes for 12 months","Guests get a refund if they find a better hotel"],a:1,
ex:"Best Price Guarantee = the OTA's promise to guests that they offer the lowest available rate. This relies on rate parity — if hotels have lower rates elsewhere, the guarantee fails."},
{q:"Rate parity is increasingly being challenged in many markets because?",clue:"💡 Hotels want more freedom to price direct bookings differently...",
opts:["Hotels found it reduces their profits on OTAs","Hotels and regulators argue parity clauses reduce competition and limit hotels' ability to promote direct bookings","Guests prefer parity","OTAs make more money without parity"],a:1,
ex:"Many countries (EU, Australia) have weakened parity clauses as anti-competitive. Narrow parity (same price, but hotels can offer members-only deals directly) is the evolving compromise."}
]},

{day:15,theme:"Cancellation Policies",emoji:"❌",zone:2,zoneLabel:"Intermediate Zone",
intro:"Day 15! Cancellation policies define what happens when plans change. Guests ask about these constantly.",
keyTerms:[["Free Cancellation","Can cancel without charge before deadline"],["No Show","Guest booked but never arrived"],["Cancellation Deadline","Last time guest can cancel without penalty"]],
questions:[
{q:"'Free Cancellation' on an OTA listing means?",clue:"💡 Flexibility for the guest — with a time limit...",
opts:["The hotel never charges anyone for anything","Guest can cancel without penalty before the specified deadline","Cancellation is free forever even day of arrival","Only applies to business travelers"],a:1,
ex:"Free Cancellation = no charge if cancelled by the deadline (usually 24–72 hours before check-in). After the deadline, penalties apply. Always check the specific policy."},
{q:"What is a 'No Show' in hotel terminology?",clue:"💡 The guest confirmed but then didn't appear...",
opts:["A guest who arrives very late","A guest who made a reservation but never arrived without cancelling","A hotel that closed unexpectedly","A failed OTA booking"],a:1,
ex:"No Show = booked reservation, guest didn't arrive, didn't cancel. Hotels typically charge the full first night rate (or full stay for non-refundable bookings). Major revenue loss otherwise."},
{q:"A non-refundable booking guest wants to cancel. What happens?",clue:"💡 The clue is in the name: non-refundable...",
opts:["Full refund — hotels must always refund","Partial refund — 50% returned","No refund — hotel keeps the full payment","Free cancellation within 24 hours only"],a:2,
ex:"Non-refundable = no refund under any circumstances (barring exceptional situations handled case-by-case). Guests accepted this when booking the cheaper rate."},
{q:"Why do some hotels charge 'first night penalty' for late cancellations?",clue:"💡 The hotel already reserved that room for the guest...",

{q:"What does 'cancel before 2pm on the day of arrival' mean?",clue:"💡 There's a specific time window...",

]},

{day:16,theme:"Inventory & Channel Management",emoji:"🔄",zone:2,zoneLabel:"Intermediate Zone",
intro:"Day 16! Inventory management keeps rooms from being double-booked across all channels. Critical operational knowledge.",
keyTerms:[["Allotment","Block of rooms allocated to a specific OTA"],["Stop Sell","Blocking all online sales — usually when full"],["Channel Manager","Software syncing rates/rooms across all OTAs simultaneously"]],
questions:[
{q:"What is a hotel 'allotment' in OTA terms?",clue:"💡 The hotel reserves a specific number of rooms for the OTA...",
opts:["Total number of hotel rooms","Block of rooms specifically allocated and guaranteed to an OTA","Monthly revenue allocation","Commission percentage"],a:1,
ex:"Allotment = a dedicated block of rooms reserved for an OTA to sell. E.g., 'Agoda has 20 allotment rooms.' Ensures availability but requires management."},
{q:"What does 'Stop Sell' mean on an OTA?",clue:"💡 No more rooms to sell — like a red light...",
opts:["The hotel is stopping operations permanently","Blocking online bookings — typically because the hotel is fully booked","A promotion that has ended","Stopping sales to one specific OTA"],a:1,
ex:"Stop Sell = close availability on the OTA. Hotels do this when they're full, during maintenance, or when managing specific booking channels. Usually set via the extranet or channel manager."},
{q:"What is a 'Channel Manager'?",clue:"💡 Managing 10 OTAs manually is impossible — this software does it...",
opts:["A hotel employee who manages guest channels on TV","Software that syncs room rates and availability across all OTAs simultaneously","A software for managing hotel restaurants","A person at the OTA who manages hotel relationships"],a:1,
ex:"Channel Manager (e.g., SiteMinder, Cloudbeds) automatically pushes rate and availability changes to all OTAs at once — preventing overbooking and saving hours of manual work."},
{q:"What is 'overbooking' and why is it risky?",clue:"💡 More bookings than rooms = a very unhappy guest...",

ex:"Overbooking happens when multiple channels sell the same room (without a channel manager to sync). Result: a confirmed guest arrives and has no room — a PR disaster."},
{q:"'Walking a guest' means?",clue:"💡 The hotel is full but the guest has a confirmed booking...",

{day:17,theme:"Booking Patterns & Behavior",emoji:"🔍",zone:2,zoneLabel:"Intermediate Zone",
intro:"Day 17! Understanding HOW and WHEN guests book helps you advise hotel partners on strategy and promotions.",

questions:[

{day:25,theme:"Advanced Revenue Metrics",emoji:"📊💡",zone:3,zoneLabel:"Expert Zone",
intro:"Day 25! Beyond RevPAR — the metrics sophisticated hoteliers and revenue managers use to measure total performance.",
keyTerms:[["TRevPAR","Total Revenue Per Available Room — all revenue streams"],["GOPPAR","Gross Operating Profit Per Available Room"],["Pick-Up","New bookings received in a given time period"]],
questions:[
{q:"TRevPAR differs from RevPAR in that it includes?",clue:"💡 Think beyond just rooms — hotels earn money from many places...",
opts:["Only room revenue, more precisely calculated","All hotel revenue streams: rooms, F&B, spa, parking, events, etc.","Revenue from the top-performing rooms only","Total annual revenue per room"],a:1,
ex:"TRevPAR = Total Revenue Per Available Room. Includes ALL revenue: rooms, food & beverage, spa, parking, meetings, and ancillary services. A more complete profitability picture."},
{q:"GOPPAR stands for?",clue:"💡 It measures actual profit, not just revenue...",
opts:["Gross Online Pricing Per Annual Revenue","Gross Operating Profit Per Available Room","General Operational Performance And Revenue Rating","Growth Oriented Property Pricing And Revenue"],a:1,
ex:"GOPPAR = Gross Operating Profit Per Available Room. Unlike RevPAR (revenue), GOPPAR subtracts operating costs — it shows actual profitability. The most accurate health indicator."},
{q:"A hotel's 'pick-up report' shows?",clue:"💡 It measures new booking activity over a period...",
opts:["Which rooms guests most commonly select","New bookings received during a specific time window (e.g., last 7 days)","Hotels picked up by a new OTA partner","Rooms selected for cleaning today"],a:1,
ex:"Pick-up = new bookings made in a given period. Daily pick-up reports show booking momentum. 'Good pick-up' = bookings flowing well. 'Weak pick-up' = may need rate adjustments or promotions."},
{q:"What does hotel 'pace' tell a revenue manager?",clue:"💡 It compares current booking momentum to a reference period...",
opts:["How fast housekeeping cleans rooms","How quickly guests check in","Booking velocity vs same period last year — ahead or behind pace","The speed of the hotel elevator"],a:2,
ex:"Pace = comparing current forward bookings to same date-range last year (or budget). 'Ahead of pace' = more bookings than this time last year. Informs pricing and promotion decisions."},
{q:"A hotel asks you why they should care about GOPPAR vs RevPAR. Your answer?",clue:"💡 Revenue looks good but profit tells the real story...",

ex:"Revenue is vanity, profit is sanity. A hotel can have impressive RevPAR but poor GOPPAR if labor, utilities, and F&B costs are bloated. GOPPAR = true operational health."}
]},

{day:26,theme:"Commission Models Deep Dive",emoji:"💵",zone:3,zoneLabel:"Expert Zone",
intro:"Day 26! How money actually flows between OTAs and hotels varies by model. This is key commercial knowledge.",
keyTerms:[["Merchant Model","OTA collects full payment, remits net to hotel"],["Agency Model","Hotel collects payment, pays commission to OTA later"],["Net Rate","Hotel rate after OTA commission is removed"]],
questions:[
{q:"In the Merchant Model (used by Agoda), how does payment work?",clue:"💡 Agoda collects from guests, then pays hotels...",
opts:["Hotel collects from guest and pays Agoda commission","Agoda collects full payment from guest, retains commission, remits net amount to hotel","Hotel and Agoda split payment equally","Guest pays both hotel and Agoda separately"],a:1,
ex:"Merchant Model: Agoda charges guest → Agoda keeps commission → Agoda remits net to hotel. Agoda controls the financial relationship. Common for prepaid bookings."},
{q:"In the Agency Model, how does payment flow?",clue:"💡 The hotel handles money, then settles with the OTA...",
opts:["Same as Merchant Model","Hotel collects full payment from guest, then pays commission to OTA after stay","OTA and hotel split 50/50","Guest pays a deposit to OTA, rest at hotel"],a:1,
ex:"Agency Model: Hotel collects payment → Hotel pays agreed commission to OTA. The hotel controls the financial relationship. Common for pay-at-property bookings on Booking.com."},
{q:"If a hotel's room rate is $100 and Agoda's commission is 20%, what is the hotel's 'net rate'?",clue:"💡 $100 minus 20%...",
opts:["$70","$75","$80","$90"],a:2,
ex:"Net rate = $100 – 20% ($20) = $80. The hotel receives $80 per room. This is the hotel's actual revenue. Understanding net rates is critical when advising partners on profitability."},
{q:"'Gross rate' refers to?",clue:"💡 This is the number guests see on the OTA...",
opts:["The hotel's internal cost of running the room","The price the guest pays — before any OTA commission deduction","The hotel's profit margin","The combined revenue from all channels"],a:1,
ex:"Gross rate = the consumer-facing price (what the guest pays). From this, the OTA deducts its commission to determine the net amount paid to the hotel."},
{q:"A hotel partners says: 'Our $100 rate on Agoda costs us more than our $100 rate direct.' Why is this true?",clue:"💡 Think about what the hotel pays for each channel...",
opts:["It's not true — rates are the same profit either way","Direct bookings require more staff to process","The Agoda booking has a 15–20% commission deducted, reducing net to hotel; direct has zero commission","Agoda charges a monthly platform fee on top"],a:2,
ex:"$100 on Agoda at 20% commission = $80 net to hotel. $100 direct = $100 net (minus minor payment processing of ~1-3%). OTA provides reach & marketing in exchange for commission — a key partner education point."}
]},
